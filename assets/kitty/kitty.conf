# ==============================================================================
# ARASAKA UI — aggressive cyberpunk terminal (cyberpunk theme)
# semi-transparent dark canvas, red-pink neon text, cyan/amber accents.
# ==============================================================================
allow_remote_control yes
listen_on unix:/tmp/kitty-arasaka

# ── surface ───────────────────────────────────────────────────────────────────
background            #08040a
foreground            #ff8fa8
background_opacity    0.82
background_blur       28
dim_opacity           0.55

selection_background  #ff2d50
selection_foreground  #08040a
url_color             #25e0ff

window_padding_width  16
draw_minimal_borders  yes
window_border_width   1.5pt
hide_window_decorations no
active_border_color   #ff2d50
inactive_border_color #3a0a16

# ── type ──────────────────────────────────────────────────────────────────────
font_family          JetBrains Mono
bold_font            JetBrains Mono Bold
font_size            11.0
bold_is_bright       yes
adjust_column_width  102%

repaint_delay    6
input_delay      0
sync_to_monitor  yes

# ── cursor (aggressive red trail) ─────────────────────────────────────────────
cursor                #ff2d50
cursor_text_color     #08040a
cursor_shape          beam
cursor_beam_thickness 2.2
cursor_blink_interval 0.5
cursor_trail          3
cursor_trail_decay    0.1 0.4

enable_audio_bell     no
visual_bell_duration  0.12
visual_bell_color     #ff2d50
window_alert_on_bell  yes

# ── tab bar ───────────────────────────────────────────────────────────────────
tab_bar_style           separator
tab_separator           " ░ "
tab_activity_symbol     "⌁ "
active_tab_background    #ff2d50
active_tab_foreground    #08040a
active_tab_font_style    bold
inactive_tab_background  #1a0810
inactive_tab_foreground  #ff8fa8
tab_bar_background       #08040a

# ── palette: Arasaka red/pink neon + cyan / amber accents ─────────────────────
color0  #1a0a10
color8  #5a2030
color1  #ff2d50
color9  #ff5d7a
color2  #2dffb0
color10 #74ffce
color3  #ffb030
color11 #ffd45e
color4  #25e0ff
color12 #6df0ff
color5  #ff4d9a
color13 #ff85be
color6  #2de0e8
color14 #74f2f8
color7  #ffc6d4
color15 #fff0f4
